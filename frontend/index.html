<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Meeting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
        <div class="lobby-card">
            <h1>Virtual Meeting</h1>
            <input type="text" id="username-input" placeholder="Enter your name" maxlength="20" />
            <div class="lobby-avatar-preview" id="lobby-avatar-preview">
                <div class="avatar-circle" id="lobby-avatar-circle"></div>
            </div>
            <button id="customize-btn" class="btn btn-secondary">Customize Avatar</button>
            <button id="join-meeting-btn" class="btn btn-primary">Join Meeting</button>
        </div>
    </div>

    <!-- AVATAR BUILDER SCREEN -->
    <div id="builder-screen" class="screen" style="display:none;">
        <div class="builder-layout">
            <div class="builder-canvas-container">
                <canvas id="avatar-canvas"></canvas>
            </div>
            <div class="builder-controls">
                <h2>Customize Avatar</h2>

                <div class="control-group">
                    <label>Skin Color</label>
                    <input type="color" id="skin-color" value="#f5cba7" />
                </div>

                <div class="control-group">
                    <label>Hair Style</label>
                    <select id="hair-style">
                        <option value="short">Short</option>
                        <option value="spiky">Spiky</option>
                        <option value="curly">Curly</option>
                        <option value="long">Long</option>
                        <option value="bald">Bald</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Hair Color</label>
                    <input type="color" id="hair-color" value="#3d2314" />
                </div>

                <div class="control-group">
                    <label>Eye Style</label>
                    <select id="eye-style">
                        <option value="round">Round</option>
                        <option value="happy">Happy</option>
                        <option value="sleepy">Sleepy</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Eye Color</label>
                    <input type="color" id="eye-color" value="#2c3e50" />
                </div>

                <div class="control-group">
                    <label>Outfit Color</label>
                    <input type="color" id="outfit-color" value="#3498db" />
                </div>

                <div class="control-group">
                    <label>Outfit Style</label>
                    <select id="outfit-style">
                        <option value="casual">Casual</option>
                        <option value="formal">Formal</option>
                        <option value="hoodie">Hoodie</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Accessory</label>
                    <select id="accessory">
                        <option value="none">None</option>
                        <option value="glasses">Glasses</option>
                        <option value="beanie">Beanie</option>
                        <option value="headphones">Headphones</option>
                    </select>
                </div>

                <button id="save-avatar-btn" class="btn btn-primary">Save & Continue</button>
            </div>
        </div>
    </div>

    <!-- MEETING ROOM SCREEN -->
    <div id="meeting-screen" class="screen" style="display:none;">
        <div class="meeting-header">
            <h2>Meeting Room</h2>
            <span class="room-id-display" id="room-id-display"></span>
        </div>
        <div class="meeting-body">
            <div class="local-preview" id="local-preview">
                <video id="local-video" autoplay muted playsinline></video>
                <div class="local-avatar-overlay" id="local-avatar-overlay">
                    <div class="avatar-circle" id="local-avatar-circle"></div>
                </div>
            </div>
            <div class="container" id="meeting-container"></div>
        </div>
        <div class="meeting-controls">
            <span class="participant-count" id="participant-count">Participants: 0</span>
            <button class="btn btn-secondary meeting-btn" id="mic-btn" title="Mute/Unmute">🎤</button>
            <button class="btn btn-secondary meeting-btn" id="cam-btn" title="Camera On/Off">📷</button>
            <button class="btn btn-secondary meeting-btn" id="screen-btn" title="Share Screen">🖥️</button>
            <button class="btn btn-danger leave-btn" id="leave-btn">Leave</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        // Mini OrbitControls for r128 (CDN-safe fallback)
        // Uses auto-rotation and basic drag-to-rotate
        if (typeof THREE.OrbitControls === 'undefined') {
            THREE.OrbitControls = class {
                constructor(camera, domElement) {
                    this.camera = camera; this.domElement = domElement;
                    this.target = new THREE.Vector3(0, 0.8, 0);
                    this.enableDamping = true; this.dampingFactor = 0.08;
                    this.autoRotate = true; this.autoRotateSpeed = 2;
                    this.minDistance = 2.5; this.maxDistance = 8;
                    this._spherical = new THREE.Spherical();
                    this._sphericalDelta = new THREE.Spherical();
                    this._offset = new THREE.Vector3();
                    this._isDown = false; this._prev = { x: 0, y: 0 };
                    this._theta = 0; this._phi = Math.PI / 4; this._radius = 5;

                    const onDown = (e) => { this._isDown = true; this._prev = { x: e.clientX, y: e.clientY }; this.autoRotate = false; };
                    const onMove = (e) => {
                        if (!this._isDown) return;
                        const dx = e.clientX - this._prev.x;
                        const dy = e.clientY - this._prev.y;
                        this._theta -= dx * 0.01;
                        this._phi = Math.max(0.1, Math.min(Math.PI / 2, this._phi - dy * 0.01));
                        this._prev = { x: e.clientX, y: e.clientY };
                    };
                    const onUp = () => { this._isDown = false; };
                    const onWheel = (e) => {
                        this._radius = Math.max(this.minDistance, Math.min(this.maxDistance, this._radius + e.deltaY * 0.01));
                    };
                    domElement.addEventListener('mousedown', onDown);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    domElement.addEventListener('wheel', onWheel);
                    this._dispose = () => { domElement.removeEventListener('mousedown', onDown); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); domElement.removeEventListener('wheel', onWheel); };
                }
                update() {
                    if (this.autoRotate) this._theta += this.autoRotateSpeed * 0.01;
                    const x = this._radius * Math.sin(this._phi) * Math.sin(this._theta);
                    const y = this._radius * Math.cos(this._phi);
                    const z = this._radius * Math.sin(this._phi) * Math.cos(this._theta);
                    this.camera.position.set(this.target.x + x, this.target.y + y, this.target.z + z);
                    this.camera.lookAt(this.target);
                }
                dispose() { if (this._dispose) this._dispose(); }
            };
        }
    </script>
    <script src="js/signaling.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="js/avatar-builder.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
